        :root {
            --color-morado-oscuro: #4a148c;
            --color-morado-medio: #7b1fa2;
            --color-morado-claro: #e1bee7;
            --color-acento: #ffeb3b;
            --color-borde: #000;
            --bg-body: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* --- ENCABEZADO --- */
        .header-dignidad {
            background: white;
            max-width: 900px;
            width: 95%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 20, 140, 0.15);
            overflow: hidden;
            margin-bottom: 10px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(123, 31, 162, 0.1);
        }
        .bandera-partido {
            height: 10px;
            width: 100%;
            background: linear-gradient(90deg, var(--color-morado-oscuro) 0%, var(--color-morado-medio) 100%);
        }
        .header-content { padding: 35px 25px; }
        .header-dignidad h1 {
            color: #333;
            text-transform: uppercase;
            font-size: 2.4rem;
            margin: 0 0 15px 0;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header-dignidad h1 span {
            color: var(--color-morado-oscuro);
            display: block;
            font-size: 2.8rem;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
        }
        .mensaje-persuasivo {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 750px;
            margin-left: auto;
            margin-right: auto;
            background-color: #fafafa;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--color-morado-medio);
        }
        .mensaje-persuasivo strong { color: var(--color-morado-oscuro); font-weight: 900; }
        .cta-box {
            background: linear-gradient(135deg, var(--color-morado-oscuro) 0%, var(--color-morado-medio) 100%);
            color: white;
            display: inline-block;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(123, 31, 162, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .cta-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(123, 31, 162, 0.6);
        }
        .cta-sub {
            display: block;
            font-size: 0.9rem;
            font-weight: normal;
            opacity: 0.9;
            margin-top: 5px;
        }
        /* --- TARJETONES --- */
        .seccion-electoral {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .titulo-tarjeton {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #333;
        }
        .tarjeta-container {
            background-color: white;
            border: 3px solid var(--color-borde);
            border-radius: 25px;
            padding: 20px 30px;
            display: flex;
            gap: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 95%;
            width: fit-content;
        }
        .info-partido {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 160px;
            text-align: center;
        }
        .info-partido img {
            width: 100%;
            height: auto;
            object-fit: contain;
            margin: 10px 0;
        }
        .texto-superior, .texto-inferior {
            font-weight: bold;
            font-size: 0.8rem;
            color: #000;
        }
        .contenedor-numeros { display: grid; align-content: center; }
        .numero {
            border: 2px solid #000;
            border-radius: 8px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            cursor: default;
            transition: transform 0.1s;
        }
        .seleccionado {
            background-color: var(--color-morado-claro);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .seleccionado:hover {
            background-color: var(--color-morado-medio);
            color: white;
            transform: scale(1.1);
        }
        /* === NUEVO: Subrayado FUERTE al hacer clic === */
        .numero.seleccionado.activo {
            background-color: var(--color-morado-medio) !important;
            color: white !important;
            border: 4px solid var(--color-morado-oscuro);
            box-shadow: 0 4px 15px rgba(123, 31, 162, 0.5);
            text-decoration: underline;
            text-decoration-color: var(--color-acento);
            text-underline-offset: 6px;
            transform: scale(1.12);
        }
        .grilla-senado { grid-template-columns: repeat(12, 1fr); gap: 6px; }
        .grilla-senado .numero { width: 35px; height: 28px; font-size: 14px; }
        .grilla-camara { grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grilla-camara .numero { width: 70px; height: 40px; font-size: 18px; border-radius: 12px; }
        /* --- ESTILOS DEL MODAL MEJORADO --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 15px;
            box-sizing: border-box;
        }
        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            animation: zoomIn 0.3s ease-out;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            color: white;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background 0.3s;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .close-btn:hover { background: #d62027; border-color: white; }
        .card-img-top {
            width: 100%;
            height: 280px;
            object-fit: cover;
            object-position: top center;
            flex-shrink: 0;
            background-color: #eee;
        }
        .card-body {
            padding: 25px 30px;
            text-align: center;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--color-morado-medio) #f1f1f1;
        }
        .card-body::-webkit-scrollbar { width: 8px; }
        .card-body::-webkit-scrollbar-track { background: #f1f1f1; }
        .card-body::-webkit-scrollbar-thumb { background: var(--color-morado-medio); border-radius: 4px; }
        .card-name {
            font-size: 26px;
            margin: 0 0 5px 0;
            color: var(--color-morado-oscuro);
            line-height: 1.2;
        }
        .card-slogan {
            font-style: italic;
            color: #d62027;
            font-weight: 700;
            margin-bottom: 20px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        /* === NUEVO: Número grande en el modal (SENADO 10, etc.) === */
        .modal-number {
            background: linear-gradient(90deg, var(--color-morado-oscuro), var(--color-morado-medio));

            border-radius: 30px;

            font-weight: 900;
            margin-bottom: 15px;

        .card-bio {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 25px;

        .social-container {

            border-radius: 12px;

            align-items: center;

            color: #666;
            font-weight: bold;
            text-transform: uppercase;

            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; text-decoration: none; font-size: 20px;

            .grilla-senado { grid-template-columns: repeat(6, 1fr); }
            .card-img-top { height: 220px; }
            .card-name { font-size: 22px; }
            .modal-number { font-size: 1.25rem; padding: 6px 18px; }

        // --- 2. VARIABLE PARA SABER CUÁL NÚMERO ESTÁ ACTIVO ---
        let currentActiveNumber = null;

        // --- 3. RENDERIZADO DE GRILLAS ---
        function crearGrilla(contenedorId, inicio, fin, numerosResaltados) {
            const contenedor = document.getElementById(contenedorId);
            contenedor.innerHTML = ''; // limpiar por si acaso

            for (let i = inicio; i <= fin; i++) {
                const div = document.createElement('div');
                div.classList.add('numero');
                div.textContent = i;

                if (candidatosData[i] || numerosResaltados.includes(i)) {
                    div.classList.add('seleccionado');

                    // === CLIC: subrayado FUERTE + mantener resaltado ===
                    div.onclick = () => {
                        // Quitar el subrayado fuerte al anterior
                        if (currentActiveNumber && currentActiveNumber !== div) {
                            currentActiveNumber.classList.remove('activo');
                        }
                        // Activar el nuevo
                        div.classList.add('activo');
                        currentActiveNumber = div;

                        openModal(i);
                    };
                }
                contenedor.appendChild(div);
            }
        }

        // Definir números válidos
        const idsSenado = Object.keys(candidatosData).map(Number).filter(n => n <= 100);
        const idsCamara = Object.keys(candidatosData).map(Number).filter(n => n > 100);

        crearGrilla('grid-senado', 1, 100, idsSenado);
        crearGrilla('grid-camara', 101, 107, idsCamara);

        // --- 4. MODAL CON NÚMERO GRANDE ---
        const modal = document.getElementById('modal');
        const cardContent = document.getElementById('card-content');

        function openModal(idCandidato) {
            const data = candidatosData[idCandidato];
            if (!data) return;

            const tipoEleccion = idCandidato <= 100 ? 'SENADO' : 'CÁMARA POR SANTANDER';

            let redesHtml = '';
            if (Array.isArray(data.redes) && data.redes.length > 0) {
                data.redes.forEach(url => {
                    let iconClass = 'fa-link';
                    let bgClass = 'bg-default';
                    if (url.includes('facebook')) { iconClass = 'fa-facebook-f'; bgClass = 'bg-facebook'; }
                    else if (url.includes('x.com') || url.includes('twitter')) { iconClass = 'fa-x-twitter'; bgClass = 'bg-twitter'; }
                    else if (url.includes('instagram')) { iconClass = 'fa-instagram'; bgClass = 'bg-instagram'; }
                    else if (url.includes('whatsapp')) { iconClass = 'fa-whatsapp'; bgClass = 'bg-whatsapp'; }
                    else if (url.includes('youtube')) { iconClass = 'fa-youtube'; bgClass = 'bg-youtube'; }
                    redesHtml += `<a href="${url}" target="_blank" class="social-btn ${bgClass}"><i class="fa-brands ${iconClass}"></i></a>`;
                });
            } else {
                redesHtml = '<span style="color:#999; font-size:12px">No disponibles</span>';
            }

            cardContent.innerHTML = `
                <div class="close-btn" onclick="closeModal(event)"><i class="fa-solid fa-xmark"></i></div>
                <img src="${data.imagen_url}" alt="${data.nombre}" class="card-img-top" onerror="this.src='https://via.placeholder.com/400x320?text=Sin+Imagen'">
                <div class="card-body">
                    <!-- NÚMERO GRANDE EN EL MODAL -->
                    <div class="modal-number">${tipoEleccion} ${idCandidato}</div>
                    
                    <h2 class="card-name">${data.nombre}</h2>
                    ${data.slogan ? `<div class="card-slogan"><i class="fa-solid fa-bullhorn"></i> ${data.slogan}</div>` : ''}
                    <p class="card-bio">${data.biografia || "Información en proceso de actualización."}</p>
                   
                    <div class="social-container">
                        <span class="social-label">Síguelo en:</span>
                        <div style="display:flex; gap:8px;">
                            ${redesHtml}
                        </div>
                    </div>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal(event) {
            modal.style.display = 'none';
            // El número sigue subrayado fuerte en la grilla (último visto)
        }

        // Cerrar con Escape
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                modal.style.display = 'none';
            }
        });
    </script>
